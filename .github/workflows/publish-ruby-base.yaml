name: Publish Ruby Base Binary

on:
  workflow_dispatch:

# Must match the version in packages/template/bin/build-ruby-base
env:
  RUBY_BASE_VERSION: '3.3.8'

jobs:
  build_and_publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.74.0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        env:
          BUNDLE_GEMFILE: packages/template/ruby-wasm/Gemfile.base
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache ruby.wasm build artifacts
        uses: actions/cache@v4
        with:
          path: |
            packages/template/ruby-wasm/build
            packages/template/ruby-wasm/rubies
          key: ${{ runner.os }}-ruby-base-${{ hashFiles('packages/template/ruby-wasm/Gemfile.base.lock') }}
          restore-keys: |
            ${{ runner.os }}-ruby-base-

      - name: Build base binary
        working-directory: ./packages/template
        run: ./bin/build-ruby-base

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp packages/template/ruby-wasm/dist/ruby-base.wasm release-assets/
          cp packages/template/ruby-wasm/rbconfig/wasm32-wasi/rbconfig.rb release-assets/

          # Stage the runtime subset of the usr/ tree (Ruby stdlib). pack-gems
          # maps it to /usr in the same wasi-vfs pack as the gems; without it
          # the packed binary boots but fails on the first stdlib require.
          # Mirrors pack-gems' own staging: local/lib + local/share only,
          # without bin/, include/, and libruby-static.a.
          USR_DIR="$(cat packages/template/ruby-wasm/dist/usr-dir.txt)"
          mkdir -p usr-staging/usr/local
          cp -R "$USR_DIR/local/lib" usr-staging/usr/local/
          cp -R "$USR_DIR/local/share" usr-staging/usr/local/
          find usr-staging -name 'libruby-static.a' -delete
          tar -czf release-assets/usr.tar.gz -C usr-staging usr

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="ruby-base-v${RUBY_BASE_VERSION}"

          # Delete existing release if it exists
          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          gh release create "$TAG" \
            --title "Ruby Base Binary v${RUBY_BASE_VERSION}" \
            --notes "Pre-built Ruby ${RUBY_BASE_VERSION} WASM base binary for dynamic gem packing. Assets: ruby-base.wasm (raw pre-VFS binary), rbconfig.rb (cross-compile config), usr.tar.gz (stripped stdlib tree, mapped to /usr at pack time)." \
            release-assets/ruby-base.wasm \
            release-assets/rbconfig.rb \
            release-assets/usr.tar.gz
